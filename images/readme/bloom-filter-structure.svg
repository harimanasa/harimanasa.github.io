<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-labelledby="title desc">
  <title id="title">Bloom filter  bit array and hash functions</title>
  <desc id="desc">Diagram: elements map through k hash functions into positions in a fixed-size bit array.</desc>
  <rect width="720" height="280" fill="#f8f9fa"/>
  <text x="360" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#1a1a1a">Bloom filter: inputs Æ hash functions Æ bit array</text>
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="80" height="44" rx="6" fill="#009688" opacity="0.9"/>
    <text x="40" y="28" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">x</text>
    <text x="40" y="64" text-anchor="middle" fill="#555" font-size="11" font-family="system-ui,sans-serif">item</text>
  </g>
  <g stroke="#009688" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M130 92 L200 62"/>
    <path d="M130 92 L200 92"/>
    <path d="M130 92 L200 122"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#009688"/>
    </marker>
  </defs>
  <g transform="translate(200, 48)">
    <text x="60" y="-8" text-anchor="middle" font-size="12" fill="#333" font-family="system-ui,sans-serif">hü(x)</text>
    <text x="60" y="50" text-anchor="middle" font-size="12" fill="#333" font-family="system-ui,sans-serif">hé(x)</text>
    <text x="60" y="108" text-anchor="middle" font-size="12" fill="#333" font-family="system-ui,sans-serif">h¢(x)</text>
  </g>
  <g transform="translate(320, 60)">
    <text x="180" y="-28" text-anchor="middle" font-size="13" fill="#333" font-family="Georgia, serif">m-bit array (all 0 initially)</text>
    <g font-family="monospace" font-size="11">
      <rect x="0" y="0" width="28" height="36" fill="#fff" stroke="#ccc"/><text x="14" y="23" text-anchor="middle">0</text>
      <rect x="30" y="0" width="28" height="36" fill="#fff" stroke="#ccc"/><text x="44" y="23" text-anchor="middle">0</text>
      <rect x="60" y="0" width="28" height="36" fill="#990000" fill-opacity="0.35" stroke="#990000"/><text x="74" y="23" text-anchor="middle">1</text>
      <rect x="90" y="0" width="28" height="36" fill="#fff" stroke="#ccc"/><text x="104" y="23" text-anchor="middle">0</text>
      <rect x="120" y="0" width="28" height="36" fill="#990000" fill-opacity="0.35" stroke="#990000"/><text x="134" y="23" text-anchor="middle">1</text>
      <rect x="150" y="0" width="28" height="36" fill="#fff" stroke="#ccc"/><text x="164" y="23" text-anchor="middle">0</text>
      <rect x="180" y="0" width="28" height="36" fill="#990000" fill-opacity="0.35" stroke="#990000"/><text x="194" y="23" text-anchor="middle">1</text>
      <rect x="210" y="0" width="28" height="36" fill="#fff" stroke="#ccc"/><text x="224" y="23" text-anchor="middle">0</text>
    </g>
  </g>
  <text x="360" y="250" text-anchor="middle" font-size="12" fill="#555" font-family="system-ui,sans-serif">Insert: set bits at hü(x)&h¢(x) to 1. Query: all those bits must be 1 to answer maybe in set.</text>
</svg>
