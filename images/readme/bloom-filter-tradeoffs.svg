<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="t2 d2">
  <title id="t2">Bloom filter guarantees and limitations</title>
  <desc id="d2">Visual summary: no false negatives, possible false positives, space-efficient.</desc>
  <rect width="720" height="260" fill="#fafafa"/>
  <text x="360" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="#1a1a1a">Bloom filter  what you get</text>
  <g transform="translate(40, 60)">
    <rect width="300" height="160" rx="10" fill="#e8f5f4" stroke="#009688" stroke-width="2"/>
    <text x="150" y="32" text-anchor="middle" font-weight="700" fill="#00695c" font-family="system-ui,sans-serif" font-size="14">Guarantees</text>
    <text x="24" y="62" fill="#333" font-family="system-ui,sans-serif" font-size="13">" If query says not present ’</text>
    <text x="36" y="82" fill="#333" font-family="system-ui,sans-serif" font-size="13">  item is definitely not in the set</text>
    <text x="24" y="112" fill="#333" font-family="system-ui,sans-serif" font-size="13">" No false negatives</text>
    <text x="24" y="138" fill="#333" font-family="system-ui,sans-serif" font-size="13">" Compact memory vs exact structures</text>
  </g>
  <g transform="translate(380, 60)">
    <rect width="300" height="160" rx="10" fill="#fce4ec" stroke="#880e4f" stroke-width="1.5"/>
    <text x="150" y="32" text-anchor="middle" font-weight="700" fill="#880e4f" font-family="system-ui,sans-serif" font-size="14">Trade-offs</text>
    <text x="24" y="62" fill="#333" font-family="system-ui,sans-serif" font-size="13">" If query says maybe present ’</text>
    <text x="36" y="82" fill="#333" font-family="system-ui,sans-serif" font-size="13">  could be a false positive</text>
    <text x="24" y="112" fill="#333" font-family="system-ui,sans-serif" font-size="13">" No delete (classic Bloom)*</text>
    <text x="24" y="138" fill="#666" font-family="system-ui,sans-serif" font-size="11">*Counting / variants allow removals</text>
  </g>
</svg>
